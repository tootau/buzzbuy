<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Meus Links</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --bg-color: #0f172a;
            --card-bg: rgba(255, 255, 255, 0.05);
            --card-border: rgba(255, 255, 255, 0.1);
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
            --accent: #3b82f6;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', sans-serif; }
        body { background-color: var(--bg-color); color: var(--text-main); min-height: 100vh; display: flex; justify-content: center; align-items: flex-start; overflow-x: hidden; position: relative; padding: 2rem 1rem; }
        .bg-shape1 { position: absolute; width: 400px; height: 400px; background: radial-gradient(circle, rgba(59,130,246,0.3) 0%, rgba(0,0,0,0) 70%); top: -100px; left: -100px; border-radius: 50%; animation: float 8s infinite alternate ease-in-out; z-index: -1; }
        .bg-shape2 { position: absolute; width: 500px; height: 500px; background: radial-gradient(circle, rgba(139,92,246,0.25) 0%, rgba(0,0,0,0) 70%); bottom: -150px; right: -100px; border-radius: 50%; animation: float 10s infinite alternate-reverse ease-in-out; z-index: -1; }
        @keyframes float { 0% { transform: translateY(0px) translateX(0px); } 100% { transform: translateY(30px) translateX(30px); } }
        .container { width: 100%; max-width: 480px; background: var(--card-bg); backdrop-filter: blur(16px); -webkit-backdrop-filter: blur(16px); border: 1px solid var(--card-border); border-radius: 24px; padding: 2.5rem 2rem; text-align: center; box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5); animation: fadeIn 1s ease-out forwards; opacity: 0; transform: translateY(20px); margin-top: 20px;}
        @keyframes fadeIn { to { opacity: 1; transform: translateY(0); } }
        
        .profile-img-container { width: 110px; height: 110px; margin: 0 auto 1.2rem auto; border-radius: 50%; padding: 4px; background: linear-gradient(135deg, #3b82f6, #8b5cf6); position: relative; }
        .profile-img { width: 100%; height: 100%; border-radius: 50%; object-fit: cover; border: 4px solid var(--bg-color); background-color: white;}
        .verified-badge { position: absolute; bottom: 5px; right: 5px; background: #10b981; color: white; font-size: 12px; width: 24px; height: 24px; border-radius: 50%; display: flex; align-items: center; justify-content: center; border: 3px solid var(--bg-color); }
        h1 { font-size: 1.5rem; font-weight: 700; margin-bottom: 0.5rem; letter-spacing: -0.5px; }
        p.bio { color: var(--text-muted); font-size: 0.95rem; line-height: 1.5; margin-bottom: 1.5rem; }
        
        /* Redes Sociais */
        .social-icons { display: flex; justify-content: center; flex-wrap: wrap; gap: 1rem; margin-bottom: 2rem; }
        .social-icon { color: #f8fafc; font-size: 1.5rem; transition: all 0.3s ease; text-decoration: none; opacity: 0.8; }
        .social-icon:hover { opacity: 1; transform: scale(1.15); color: #3b82f6; }

        /* Barra de Pesquisa NOVA */
        .search-box { position: relative; margin-bottom: 1.5rem; width: 100%; }
        .search-box input { width: 100%; padding: 1rem 1rem 1rem 3rem; border-radius: 16px; border: 1px solid rgba(255, 255, 255, 0.1); background: rgba(255, 255, 255, 0.05); color: var(--text-main); font-size: 1rem; outline: none; transition: all 0.3s ease; font-family: 'Inter', sans-serif; }
        .search-box input:focus { background: rgba(255, 255, 255, 0.1); border-color: var(--accent); box-shadow: 0 0 0 2px rgba(59, 130, 246, 0.2); }
        .search-box input::placeholder { color: var(--text-muted); }
        .search-box .search-icon { position: absolute; left: 1.2rem; top: 50%; transform: translateY(-50%); color: var(--text-muted); }

        .links-container { display: flex; flex-direction: column; gap: 1rem; margin-bottom: 2rem; }
        
        .link-card { display: flex; align-items: center; justify-content: space-between; background: rgba(255, 255, 255, 0.08); border: 1px solid rgba(255, 255, 255, 0.05); padding: 1rem 1.2rem; border-radius: 16px; text-decoration: none; color: var(--text-main); font-weight: 500; transition: all 0.3s cubic-bezier(0.25, 0.8, 0.25, 1); position: relative; overflow: hidden; }
        .link-card:hover { transform: translateY(-3px) scale(1.02); background: rgba(255, 255, 255, 0.15); border-color: rgba(255, 255, 255, 0.2); box-shadow: 0 10px 20px -10px rgba(0, 0, 0, 0.3); }
        
        /* Design dos Produtos */
        .product-card { justify-content: flex-start; padding: 0; text-align: left; background: #3498db; border: none; min-height: 160px; align-items: stretch; }
        .product-img { width: 45%; height: auto; object-fit: cover; border-radius: 0; margin-right: 0; border: none; background-color: white; }
        .product-info { display: flex; flex-direction: column; justify-content: space-between; flex: 1; padding: 1rem; }
        .product-title { font-weight: 600; font-size: 0.95rem; color: #ffffff; line-height: 1.3; margin-bottom: 10px; }
        .product-subtitle { font-size: 0.9rem; color: #3498db; background: #ffffff; padding: 0.6rem 1rem; border-radius: 30px; text-align: center; font-weight: 700; width: 100%; }
        .link-icon { font-size: 1.2rem; width: 30px; display: flex; align-items: center; justify-content: center; }
        .link-text { flex: 1; text-align: center; padding-right: 30px; }
        @keyframes slideUp { from { opacity: 0; transform: translateY(15px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>
    <div class="bg-shape1"></div><div class="bg-shape2"></div>
    <div class="container">
        
        <div class="profile-img-container">
            <!-- SUA FOTO: Mudei para buscar a logo.jpg direto do github -->
            <img src="logo.jpg" alt="Profile" class="profile-img" onerror="this.src='https://github.com/tootau/buzzbuy/blob/main/logo%20buzzbuy.jpg">
            <div class="verified-badge"><i class="fas fa-check"></i></div>
        </div>
        
        <!-- SEU NOME E BIO -->
        <h1>BUZZBUY</h1>
        <p class="bio">Welcome to Buzzbuy! Here you'll find a list of the best products ever discovered. Have fun! 👇</p>
        
        <!-- REDES SOCIAIS -->
        <div class="social-icons">
            <a href="https://tiktok.com/@buzzbuy_trend" target="_blank" class="social-icon" aria-label="TikTok"><i class="fab fa-tiktok"></i></a>
            <a href="https://instagram.com/buzzbuy_trend" target="_blank" class="social-icon" aria-label="Instagram"><i class="fab fa-instagram"></i></a>
            <a href="https://youtube.com/@BUZZBUY_TREND" target="_blank" class="social-icon" aria-label="YouTube"><i class="fab fa-youtube"></i></a>
            <a href="https://facebook.com/profile.php?id=61572938610265" target="_blank" class="social-icon" aria-label="Facebook"><i class="fab fa-facebook"></i></a>
            <a href="https://pinterest.com/buzzbuy_trend" target="_blank" class="social-icon" aria-label="Pinterest"><i class="fab fa-pinterest"></i></a>
            <a href="https://reddit.com/user/BUZZ_BUY/" target="_blank" class="social-icon" aria-label="Reddit"><i class="fab fa-reddit"></i></a>
            <a href="buzzbuy.trend.treasures@gmail.com" target="_blank" class="social-icon" aria-label="Email"><i class="fas fa-envelope"></i></a>
        </div>

        <!-- BARRA DE PESQUISA (NOVA) -->
        <div class="search-box">
            <i class="fas fa-search search-icon"></i>
            <input type="text" id="searchInput" placeholder="Pesquisar produto...">
        </div>

        <div class="links-container" id="dynamic-links">
            <div class="loading-text">
                <i class="fas fa-spinner fa-spin"></i> Carregando seus links...
            </div>
        </div>
        
    </div>

    <script>
        const LINK_DA_PLANILHA = "https://docs.google.com/spreadsheets/d/e/2PACX-1vRJZGWgU5AWB2SIaciNqMYAbyLj2qbL6YPjURIqK7gBqSwHdV78njYxzWY2DHX73Jj545QqMDZ2VMio/pub?output=csv"; 

        function lerLinhaCSV(linha) {
            let resultado = [];
            let pedaco = '';
            let dentroDeAspas = false;
            for (let i = 0; i < linha.length; i++) {
                let char = linha[i];
                if (char === '"' && linha[i+1] === '"') { pedaco += '"'; i++; } 
                else if (char === '"') { dentroDeAspas = !dentroDeAspas; } 
                else if (char === ',' && !dentroDeAspas) { resultado.push(pedaco); pedaco = ''; } 
                else { pedaco += char; }
            }
            resultado.push(pedaco);
            return resultado;
        }

        async function carregarLinks() {
            const container = document.getElementById('dynamic-links');
            try {
                const response = await fetch(LINK_DA_PLANILHA);
                const data = await response.text();
                container.innerHTML = '';
                const linhas = data.split(/\r?\n/);
                
                for (let i = 1; i < linhas.length; i++) {
                    if(!linhas[i].trim()) continue;
                    
                    let colunas = lerLinhaCSV(linhas[i]);
                    
                    if (colunas.length >= 2) {
                        let nome = colunas[0].trim();
                        let link = colunas[1].trim();
                        let imagem = colunas[2] ? colunas[2].trim() : '';

                        if (nome && link) {
                            const a = document.createElement('a');
                            a.href = link;
                            a.target = "_blank";
                            a.className = imagem ? "link-card product-card" : "link-card";
                            a.style.animation = `slideUp 0.5s ${0.2 + (i * 0.1)}s forwards`;
                            a.style.opacity = "0";

                            if (imagem) {
                                a.innerHTML = `
                                    <img src="${imagem}" alt="${nome}" class="product-img" onerror="this.src='https://via.placeholder.com/150?text=Foto'">
                                    <div class="product-info">
                                        <span class="product-title">${nome}</span>
                                        <span class="product-subtitle">Learn more</span>
                                    </div>
                                `;
                            } else {
                                a.innerHTML = `
                                    <i class="fas fa-link link-icon"></i>
                                    <span class="link-text">${nome}</span>
                                `;
                            }
                            container.appendChild(a);
                        }
                    }
                }
            } catch (erro) {
                console.error(erro);
                container.innerHTML = "<p>Erro ao carregar planilha.</p>";
            }
        }
        
        // LÓGICA DA BARRA DE PESQUISA (NOVO)
        document.getElementById('searchInput').addEventListener('input', function(e) {
            const termoBusca = e.target.value.toLowerCase();
            const todosLinks = document.querySelectorAll('.link-card');
            
            todosLinks.forEach(link => {
                const tituloProduto = link.querySelector('.product-title, .link-text');
                if (tituloProduto) {
                    const texto = tituloProduto.textContent.toLowerCase();
                    // Se o texto digitado existir no nome do produto, deixa visível. Se não, oculta.
                    if (texto.includes(termoBusca)) {
                        link.style.display = 'flex';
                    } else {
                        link.style.display = 'none';
                    }
                }
            });
        });

        carregarLinks();
    </script>
</body>
</html>
