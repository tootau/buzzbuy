<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Meus Links</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --bg-color: #0f172a;
            --card-bg: rgba(255, 255, 255, 0.05);
            --card-border: rgba(255, 255, 255, 0.1);
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
            --accent: #3b82f6;
            --accent-hover: #60a5fa;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Inter', sans-serif;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-main);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow-x: hidden;
            position: relative;
            padding: 2rem 1rem;
        }

        /* Animated Background Gradients */
        .bg-shape1 {
            position: absolute;
            width: 400px;
            height: 400px;
            background: radial-gradient(circle, rgba(59,130,246,0.3) 0%, rgba(0,0,0,0) 70%);
            top: -100px;
            left: -100px;
            border-radius: 50%;
            animation: float 8s infinite alternate ease-in-out;
            z-index: -1;
        }

        .bg-shape2 {
            position: absolute;
            width: 500px;
            height: 500px;
            background: radial-gradient(circle, rgba(139,92,246,0.25) 0%, rgba(0,0,0,0) 70%);
            bottom: -150px;
            right: -100px;
            border-radius: 50%;
            animation: float 10s infinite alternate-reverse ease-in-out;
            z-index: -1;
        }

        @keyframes float {
            0% { transform: translateY(0px) translateX(0px); }
            100% { transform: translateY(30px) translateX(30px); }
        }

        /* Container & Glassmorphism */
        .container {
            width: 100%;
            max-width: 450px;
            background: var(--card-bg);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid var(--card-border);
            border-radius: 24px;
            padding: 2.5rem 2rem;
            text-align: center;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            animation: fadeIn 1s ease-out forwards;
            opacity: 0;
            transform: translateY(20px);
        }

        @keyframes fadeIn {
            to { opacity: 1; transform: translateY(0); }
        }

        /* Profile Section */
        .profile-img-container {
            width: 110px;
            height: 110px;
            margin: 0 auto 1.2rem auto;
            border-radius: 50%;
            padding: 4px;
            background: linear-gradient(135deg, #3b82f6, #8b5cf6);
            position: relative;
        }

        .profile-img {
            width: 100%;
            height: 100%;
            border-radius: 50%;
            object-fit: cover;
            border: 4px solid var(--bg-color);
        }

        .verified-badge {
            position: absolute;
            bottom: 5px;
            right: 5px;
            background: #10b981;
            color: white;
            font-size: 12px;
            width: 24px;
            height: 24px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            border: 3px solid var(--bg-color);
        }

        h1 {
            font-size: 1.5rem;
            font-weight: 700;
            margin-bottom: 0.5rem;
            letter-spacing: -0.5px;
        }

        p.bio {
            color: var(--text-muted);
            font-size: 0.95rem;
            line-height: 1.5;
            margin-bottom: 2rem;
        }

        /* Links Section */
        .links-container {
            display: flex;
            flex-direction: column;
            gap: 1rem;
            margin-bottom: 2rem;
        }

        .link-card {
            display: flex;
            align-items: center;
            justify-content: space-between;
            background: rgba(255, 255, 255, 0.08);
            border: 1px solid rgba(255, 255, 255, 0.05);
            padding: 1rem 1.2rem;
            border-radius: 16px;
            text-decoration: none;
            color: var(--text-main);
            font-weight: 500;
            transition: all 0.3s cubic-bezier(0.25, 0.8, 0.25, 1);
            position: relative;
            overflow: hidden;
        }

        .link-card:hover {
            transform: translateY(-3px) scale(1.02);
            background: rgba(255, 255, 255, 0.15);
            border-color: rgba(255, 255, 255, 0.2);
            box-shadow: 0 10px 20px -10px rgba(0, 0, 0, 0.3);
        }

        .link-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 50%;
            height: 100%;
            background: linear-gradient(to right, transparent, rgba(255, 255, 255, 0.1), transparent);
            transform: skewX(-20deg);
            transition: all 0.5s ease;
        }

        .link-card:hover::before {
            left: 150%;
        }

        .link-icon {
            font-size: 1.2rem;
            width: 30px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .link-text {
            flex: 1;
            text-align: center;
            padding-right: 30px; /* To balance the icon width */
        }

        /* Specialized Colors for Icons */
        .fa-youtube { color: #ef4444; }
        .fa-instagram { color: #f43f5e; }
        .fa-tiktok { color: #f8fafc; }
        .fa-globe { color: #3b82f6; }
        .fa-shopping-bag { color: #10b981; }

        /* Estilo Especial para Produtos */
        .product-card {
            display: flex;
            align-items: center;
            justify-content: flex-start;
            padding: 0.6rem;
            text-align: left;
        }

        .product-img {
            width: 50px;
            height: 50px;
            border-radius: 10px;
            object-fit: cover;
            margin-right: 15px;
            border: 2px solid rgba(255,255,255,0.1);
        }

        .product-info {
            display: flex;
            flex-direction: column;
            flex: 1;
        }

        .product-title {
            font-weight: 600;
            font-size: 0.95rem;
            color: var(--text-main);
        }

        .product-subtitle {
            font-size: 0.8rem;
            color: var(--accent);
            margin-top: 3px;
            font-weight: 500;
        }

        /* Social Icons Bottom */
        .social-icons {
            display: flex;
            justify-content: center;
            gap: 1.2rem;
        }

        .social-icon {
            color: var(--text-muted);
            font-size: 1.5rem;
            transition: all 0.3s ease;
            text-decoration: none;
        }

        .social-icon:hover {
            color: var(--text-main);
            transform: scale(1.1);
        }

        /* Staggered Animation for links */
        .links-container a:nth-child(1) { animation: slideUp 0.5s 0.2s forwards; opacity: 0; }
        .links-container a:nth-child(2) { animation: slideUp 0.5s 0.3s forwards; opacity: 0; }
        .links-container a:nth-child(3) { animation: slideUp 0.5s 0.4s forwards; opacity: 0; }
        .links-container a:nth-child(4) { animation: slideUp 0.5s 0.5s forwards; opacity: 0; }
        .links-container a:nth-child(5) { animation: slideUp 0.5s 0.6s forwards; opacity: 0; }

        @keyframes slideUp {
            from { opacity: 0; transform: translateY(15px); }
            to { opacity: 1; transform: translateY(0); }
        }

    </style>
</head>
<body>

    <div class="bg-shape1"></div>
    <div class="bg-shape2"></div>

    <div class="container">
        
        <div class="profile-img-container">
            <!-- Substitua esta URL pela sua foto -->
            <img src="https://ui-avatars.com/api/?name=Seu+Nome&background=1e293b&color=fff&size=200" alt="Profile" class="profile-img">
            <div class="verified-badge">
                <i class="fas fa-check"></i>
            </div>
        </div>

        <h1>@seu_usuario</h1>
        <p class="bio">Criador de conteúdo | Dicas de tecnologia 🚀<br>Encontre tudo que você precisa abaixo 👇</p>

        <!-- Aqui serão injetados os links da planilha -->
        <div class="links-container" id="dynamic-links">
            <div class="loading-text">
                <i class="fas fa-spinner fa-spin"></i> Carregando seus links...
            </div>
        </div>

        <div class="social-icons">
            <a href="#" class="social-icon" aria-label="Email"><i class="fas fa-envelope"></i></a>
            <a href="#" class="social-icon" aria-label="Instagram"><i class="fab fa-instagram"></i></a>
            <a href="#" class="social-icon" aria-label="YouTube"><i class="fab fa-youtube"></i></a>
        </div>

    </div>

    <script>
        // ==========================================
        // CONFIGURAÇÃO DA PLANILHA DO GOOGLE
        // ==========================================
        // Passo 1: Crie uma planilha no Google Sheets com as colunas: Nome, Link, Imagem
        // Passo 2: Vá em Arquivo > Compartilhar > Publicar na Web
        // Passo 3: Escolha "Valores Separados por Vírgula (.csv)" e clique em Publicar.
        // Passo 4: Cole o link gerado entre as aspas abaixo:
        
        const LINK_DA_PLANILHA = "COLE_SEU_LINK_AQUI"; 
        
        // ==========================================

        async function carregarLinks() {
            const container = document.getElementById('dynamic-links');

            // Se o usuário ainda não colocou o link, mostra um aviso amigável
            if (LINK_DA_PLANILHA === "COLE_SEU_LINK_AQUI" || !LINK_DA_PLANILHA.includes('http')) {
                container.innerHTML = `
                    <div style="background: rgba(255,0,0,0.1); padding: 15px; border-radius: 10px; border: 1px solid rgba(255,0,0,0.3); margin-bottom: 20px;">
                        <p style="font-size: 0.9rem;">⚠️ <b>Atenção:</b> O site está pronto! Agora você precisa colar o link da sua Planilha do Google no código do arquivo (onde diz COLE_SEU_LINK_AQUI).</p>
                    </div>
                `;
                return;
            }

            try {
                const response = await fetch(LINK_DA_PLANILHA);
                const data = await response.text();
                
                // Limpa o texto de "Carregando..."
                container.innerHTML = '';
                
                // Lógica simples para ler o CSV (linhas separadas por quebra de linha)
                // A Regex lida com textos que tenham vírgulas dentro de aspas
                const linhas = data.split(/\r?\n/);
                
                // Ignoramos a primeira linha (que é o cabeçalho: Nome, Link, Imagem)
                for (let i = 1; i < linhas.length; i++) {
                    // Divide as colunas pela vírgula
                    // Usando um pequeno truque de regex para CSV
                    let colunas = linhas[i].match(/(".*?"|[^",\s]+)(?=\s*,|\s*$)/g) || linhas[i].split(',');
                    
                    if (colunas.length >= 2) {
                        let nome = colunas[0].replace(/^"|"$/g, '').trim();
                        let link = colunas[1].replace(/^"|"$/g, '').trim();
                        let imagem = colunas[2] ? colunas[2].replace(/^"|"$/g, '').trim() : '';

                        if (nome && link) {
                            const a = document.createElement('a');
                            a.href = link;
                            a.target = "_blank";
                            a.className = imagem ? "link-card product-card" : "link-card";
                            
                            // Adiciona um atraso na animação para cada botão aparecer em sequência
                            a.style.animation = \`slideUp 0.5s \${0.2 + (i * 0.1)}s forwards\`;
                            a.style.opacity = "0";

                            if (imagem) {
                                a.innerHTML = \`
                                    <img src="\${imagem}" alt="\${nome}" class="product-img" onerror="this.src='https://via.placeholder.com/50?text=Foto'">
                                    <div class="product-info">
                                        <span class="product-title">\${nome}</span>
                                        <span class="product-subtitle">Acessar <i class="fas fa-arrow-right"></i></span>
                                    </div>
                                \`;
                            } else {
                                a.innerHTML = \`
                                    <i class="fas fa-link link-icon"></i>
                                    <span class="link-text">\${nome}</span>
                                \`;
                            }
                            container.appendChild(a);
                        }
                    }
                }
            } catch (erro) {
                console.error("Erro ao carregar planilha", erro);
                container.innerHTML = "<p>Ocorreu um erro ao carregar seus produtos. Verifique se o link da planilha está correto.</p>";
            }
        }

        // Chama a função assim que a página abrir
        carregarLinks();
    </script>
</body>
</html>
